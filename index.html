<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Ladders 3D Plan</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #info {
            position: absolute; top: 15px; left: 15px; color: white;
            background: rgba(0, 0, 0, 0.8); padding: 12px; border-radius: 5px;
            border-left: 4px solid #4fc3f7; z-index: 10;
        }
    </style>
</head>
<body>

<div id="info">
    <strong>Dream Ladders 3D</strong><br>
    <small>Use Mouse to Rotate & Zoom</small>
</div>

<!-- Load Three.js and OrbitControls from a reliable CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // 1. Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(40, 40, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. Controls (This allows you to move around)
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    // 3. Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // 4. Floor Function
    function createRoom(w, d, h, color, x, z) {
        const group = new THREE.Group();

        // Floor
        const floorGeo = new THREE.BoxGeometry(w, 0.2, d);
        const floorMat = new THREE.MeshStandardMaterial({ color: color });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        group.add(floor);

        // Simple Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, transparent: true, opacity: 0.8 });
        
        // Back wall
        const bw = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.3), wallMat);
        bw.position.set(0, h/2, -d/2);
        group.add(bw);

        // Side wall
        const sw = new THREE.Mesh(new THREE.BoxGeometry(0.3, h, d), wallMat);
        sw.position.set(-w/2, h/2, 0);
        group.add(sw);

        group.position.set(x, 0, z);
        scene.add(group);
    }

    // 5. Building the House
    // createRoom(width, depth, wallHeight, color, x, z)
    createRoom(14, 16, 5, 0x4fc3f7, -5, 10);   // Hall
    createRoom(10, 10, 5, 0xef5350, 8, 8);     // Kitchen
    createRoom(12, 12, 5, 0x81c784, -7, -10);  // Bed 1
    createRoom(11, 12, 5, 0xffb74d, 7, -10);   // Bed 2
    createRoom(10, 15, 2, 0x90a4ae, 8, 18);    // Parking

    // 6. Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    // 7. Resize Handling
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
