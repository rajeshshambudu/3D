<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dream Ladders 3D Plan</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
        font-family: Arial, sans-serif;
    }

    #info {
        position: absolute;
        top: 15px;
        left: 15px;
        color: white;
        background: rgba(0,0,0,0.75);
        padding: 12px;
        border-radius: 8px;
        border-left: 4px solid #4fc3f7;
        z-index: 10;
    }
</style>
</head>

<body>

<div id="info">
    <strong>Dream Ladders 3D</strong><br>
    <small>Mouse: Rotate | Wheel: Zoom</small>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';


// ======================
// Scene
// ======================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);


// ======================
// Camera
// ======================

const camera = new THREE.PerspectiveCamera(
    50,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(40, 35, 40);


// ======================
// Renderer
// ======================

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);


// ======================
// Controls
// ======================

const controls = new OrbitControls(camera, renderer.domElement);

controls.enableDamping = true;
controls.dampingFactor = 0.05;


// ======================
// Lights
// ======================

const ambient = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 1.2);

sun.position.set(20, 30, 10);

sun.castShadow = true;

scene.add(sun);


// ======================
// Ground
// ======================

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(120, 120),
    new THREE.MeshStandardMaterial({
        color: 0x222222
    })
);

ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.11;

scene.add(ground);


// ======================
// Room Creator
// ======================

function createRoom(w, d, h, color, x, z) {

    const group = new THREE.Group();

    // Floor
    const floor = new THREE.Mesh(
        new THREE.BoxGeometry(w, 0.2, d),
        new THREE.MeshStandardMaterial({
            color: color
        })
    );

    floor.receiveShadow = true;

    group.add(floor);


    // Wall Material
    const wallMat = new THREE.MeshStandardMaterial({
        color: 0xe0e0e0,
        transparent: true,
        opacity: 0.85
    });


    // Back Wall
    const backWall = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 0.3),
        wallMat
    );

    backWall.position.set(0, h / 2, -d / 2);

    group.add(backWall);


    // Left Wall
    const leftWall = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, h, d),
        wallMat
    );

    leftWall.position.set(-w / 2, h / 2, 0);

    group.add(leftWall);


    // Right Wall
    const rightWall = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, h, d),
        wallMat
    );

    rightWall.position.set(w / 2, h / 2, 0);

    group.add(rightWall);


    group.position.set(x, 0, z);

    scene.add(group);
}


// ======================
// House Layout
// ======================

// Hall
createRoom(14, 16, 5, 0x4fc3f7, -5, 10);

// Kitchen
createRoom(10, 10, 5, 0xef5350, 8, 8);

// Bedroom 1
createRoom(12, 12, 5, 0x81c784, -7, -10);

// Bedroom 2
createRoom(11, 12, 5, 0xffb74d, 7, -10);

// Parking
createRoom(10, 15, 3, 0x90a4ae, 8, 18);


// ======================
// Grid Helper
// ======================

const grid = new THREE.GridHelper(100, 100);
scene.add(grid);


// ======================
// Animation
// ======================

function animate() {

    requestAnimationFrame(animate);

    controls.update();

    renderer.render(scene, camera);
}

animate();


// ======================
// Resize
// ======================

window.addEventListener('resize', () => {

    camera.aspect = window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
