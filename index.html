<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Ladders 3D Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px;
            border-left: 5px solid #4fc3f7; z-index: 10; pointer-events: none;
        }
        #controls-hint {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.6); font-size: 12px;
        }
    </style>
</head>
<body>

<div id="info">
    <strong>Dream Ladders 3D Plan</strong><br>
    <small>North Facing ↑</small>
</div>

<div id="controls-hint">Left Click: Rotate | Right Click: Pan | Scroll: Zoom</div>

<!-- Load Three.js and OrbitControls -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
// --- SCENE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(30, 40, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// --- CONTROLS ---
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- LIGHTING ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
sunLight.position.set(20, 50, 10);
scene.add(sunLight);

// --- FLOOR BASE ---
const floorGeo = new THREE.PlaneGeometry(35, 55);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d3436, side: THREE.DoubleSide });
const floorBase = new THREE.Mesh(floorGeo, floorMat);
floorBase.rotation.x = Math.PI / 2;
scene.add(floorBase);

// --- HELPER FUNCTION: CREATE ROOM & WALLS ---
function createRoom(w, d, h, color, x, z, name) {
    const group = new THREE.Group();

    // Floor Mesh
    const roomGeo = new THREE.BoxGeometry(w, 0.2, d);
    const roomMat = new THREE.MeshStandardMaterial({ color: color });
    const roomMesh = new THREE.Mesh(roomGeo, roomMat);
    group.add(roomMesh);

    // Wall logic - Thick lines to simulate walls
    const wallThick = 0.4;
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

    // Back Wall
    const bw = new THREE.Mesh(new THREE.BoxGeometry(w, h, wallThick), wallMat);
    bw.position.set(0, h/2, -d/2);
    group.add(bw);

    // Left Wall
    const lw = new THREE.Mesh(new THREE.BoxGeometry(wallThick, h, d), wallMat);
    lw.position.set(-w/2, h/2, 0);
    group.add(lw);

    // Outline/Edges for the aesthetic
    const edges = new THREE.EdgesGeometry(roomGeo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
    roomMesh.add(line);

    group.position.set(x, 0.1, z);
    scene.add(group);
}

// --- DEFINE THE HOUSE LAYOUT ---
// createRoom(width, depth, wallHeight, color, x, z)

// Main Hall
createRoom(14, 16, 4, 0x4fc3f7, -5, 10);

// Kitchen (North-East corner)
createRoom(10, 10, 4, 0xef5350, 8, 8);

// Bedroom 1 (Master)
createRoom(12, 12, 4, 0x81c784, -7, -10);

// Bedroom 2
createRoom(11, 12, 4, 0xffb74d, 7, -10);

// Staircase area
createRoom(7, 14, 2, 0xab47bc, -10, -18);

// Parking (Open walls - lower height)
createRoom(10, 15, 1, 0x90a4ae, 8, 18);

// --- ANIMATION LOOP ---
function animate() {
    requestAnimationFrame(animate);
    controls.update(); // Required for damping
    renderer.render(scene, camera);
}

animate();

// --- RESPONSIVE RESIZE ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
