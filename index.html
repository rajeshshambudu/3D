<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dream Ladders LIVE 3D</title>

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }

#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.7);
    padding:10px;
    font-family:Arial;
    font-size:13px;
    border-radius:8px;
}
</style>
</head>

<body>

<div id="ui">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1c1c);

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(40, 40, 40);

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= CONTROLS =================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(50,80,50);
scene.add(light);

// ================= GROUND =================
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(300,300),
    new THREE.MeshPhongMaterial({ color:0x2a2a2a })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

scene.add(new THREE.GridHelper(300, 100));

// ================= STATE =================
let roomObjects = [];
let rooms = [];

// ================= CLEAN SCENE =================
function clearRooms(){
    roomObjects.forEach(obj => scene.remove(obj));
    roomObjects = [];
}

// ================= ROOM =================
function createRoom(r){

    const group = new THREE.Group();

    const floor = new THREE.Mesh(
        new THREE.BoxGeometry(r.w, 0.3, r.d),
        new THREE.MeshPhongMaterial({ color:0x4fc3f7 })
    );

    group.add(floor);

    const wallMat = new THREE.MeshPhongMaterial({
        color:0xffffff
    });

    const h = r.h;

    const walls = [
        [0, h/2, -r.d/2, r.w, h, 0.3],
        [0, h/2,  r.d/2, r.w, h, 0.3],
        [-r.w/2, h/2, 0, 0.3, h, r.d],
        [ r.w/2, h/2, 0, 0.3, h, r.d],
    ];

    walls.forEach(w => {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w[3], w[4], w[5]),
            wallMat
        );
        mesh.position.set(w[0], w[1], w[2]);
        group.add(mesh);
    });

    group.position.set(r.x, 0, r.z);

    scene.add(group);
    roomObjects.push(group);
}

// ================= LABEL =================
function createLabel(text,x,y,z){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 256;
    canvas.height = 128;

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText(text, 20, 70);

    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex }));

    sprite.position.set(x,y,z);
    sprite.scale.set(10,5,1);

    scene.add(sprite);
    roomObjects.push(sprite);
}

// ================= CAMERA FIT =================
function frameScene(){
    const box = new THREE.Box3().setFromObject(scene);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    const max = Math.max(size.x, size.y, size.z);

    camera.position.set(center.x + max, center.y + max, center.z + max);
    controls.target.copy(center);
    controls.update();
}

// ================= COST =================
function cost(r){
    return (r.w*r.d*1200) + (2*(r.w+r.d)*r.h*400);
}

// ================= LOAD DATA (NO CACHE FIX) =================
async function loadData(){

    try {
        const url = "https://script.google.com/macros/s/AKfycbxjY8vWuMhIesGGfzRCBCxDfEYjm5NMa_jYJtLBW3UH6mLV-tDfvqnwoIQx2wFZJug/exec";

        const res = await fetch(url + "?t=" + Date.now(), {
            cache: "no-store"
        });

        const data = await res.json();
        rooms = data.rooms;

    } catch(e){
        console.warn("Fallback used");
        rooms = [
            { name:"HALL", w:18, d:14, h:5, x:0, z:12 },
            { name:"KITCHEN", w:10, d:10, h:5, x:15, z:-5 }
        ];
    }

    clearRooms();

    let total = 0;

    rooms.forEach(r => {
        createRoom(r);
        createLabel(r.name, r.x, 6, r.z);
        total += cost(r);
    });

    document.getElementById("ui").innerHTML =
        "Rooms: " + rooms.length + "<br>Total Cost: ₹" + total;

    frameScene();
}

// ================= AUTO REFRESH =================
setInterval(loadData, 5000);

// ================= START =================
loadData();

// ================= LOOP =================
function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene,camera);
}
animate();

// ================= RESIZE =================
window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
