<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dream Ladders MVP</title>

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui {
  position:absolute;
  top:10px; left:10px;
  color:white;
  background:rgba(0,0,0,0.6);
  padding:10px;
  font-family:Arial;
  font-size:13px;
}
</style>
</head>

<body>

<div id="ui">Loading Dream Ladders...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e1e1e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(30,25,30);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const dir = new THREE.DirectionalLight(0xffffff, 1);
dir.position.set(20,30,20);
scene.add(dir);

// ================= GROUND =================
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshPhongMaterial({ color:0x333333 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= STORAGE =================
let roomsData = [];
let roomMeshes = [];

// ================= ROOM =================
function createRoom(r){

    const group = new THREE.Group();

    const floor = new THREE.Mesh(
        new THREE.BoxGeometry(r.w, 0.3, r.d),
        new THREE.MeshPhongMaterial({ color:0x4fc3f7 })
    );
    group.add(floor);

    const wallMat = new THREE.MeshPhongMaterial({ color:0xffffff, transparent:true, opacity:0.6 });

    const walls = [
        [0, r.h/2, -r.d/2, r.w, r.h, 0.3],
        [0, r.h/2, r.d/2, r.w, r.h, 0.3],
        [-r.w/2, r.h/2, 0, 0.3, r.h, r.d],
        [r.w/2, r.h/2, 0, 0.3, r.h, r.d],
    ];

    walls.forEach(w => {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w[3], w[4], w[5]),
            wallMat
        );
        mesh.position.set(w[0], w[1], w[2]);
        group.add(mesh);
    });

    group.position.set(r.x, 0, r.z);

    scene.add(group);
    roomMeshes.push({ group, data:r });
}

// ================= LABEL =================
function createLabel(text,x,y,z){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 256;
    canvas.height = 128;

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText(text, 20, 60);

    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map:tex });

    const sprite = new THREE.Sprite(mat);
    sprite.position.set(x,y,z);
    sprite.scale.set(8,4,1);

    scene.add(sprite);
}

// ================= COST ENGINE =================
function calculateCost(r){
    const floor = r.w * r.d * 1200;
    const wall = 2*(r.w + r.d) * r.h * 400;

    return floor + wall;
}

// ================= ADJACENCY =================
function isAdjacent(a,b){
    return Math.abs(a.x - b.x) < (a.w + b.w)/2 &&
           Math.abs(a.z - b.z) < (a.d + b.d)/2;
}

// ================= LOAD DATA =================
async function loadData(){

    const url = "YOUR_GOOGLE_SCRIPT_URL";

    const res = await fetch(url);
    const data = await res.json();

    roomsData = data.rooms;

    roomsData.forEach(r => {
        createRoom(r);
        createLabel(r.name, r.x, 6, r.z);
    });

    // COST SUMMARY
    let total = 0;

    roomsData.forEach(r => total += calculateCost(r));

    document.getElementById("ui").innerHTML =
        "Rooms: " + roomsData.length + "<br>Total Cost: ₹" + total;

    // ADJACENCY LOG
    for(let i=0;i<roomsData.length;i++){
        for(let j=i+1;j<roomsData.length;j++){
            if(isAdjacent(roomsData[i], roomsData[j])){
                console.log(roomsData[i].name + " ↔ " + roomsData[j].name);
            }
        }
    }
}

loadData();

// ================= LOOP =================
function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene,camera);
}

animate();

// ================= RESIZE =================
window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
