<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Ladders 3D</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:#111;
        font-family:Arial;
    }

    #info{
        position:absolute;
        top:10px;
        left:10px;
        color:white;
        background:rgba(0,0,0,0.7);
        padding:10px;
        border-radius:6px;
        z-index:10;
    }
</style>
</head>

<body>

<div id="info">
    <b>Dream Ladders 3D</b><br>
    Mouse Rotate + Zoom
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";


// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);


// Camera
const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(30,25,30);


// Renderer
const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);


// Controls
const controls = new OrbitControls(camera,renderer.domElement);

controls.enableDamping = true;


// Lights
const ambient = new THREE.AmbientLight(0xffffff,0.8);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff,1);

light.position.set(20,30,20);

scene.add(light);


// Grid
const grid = new THREE.GridHelper(100,100);
scene.add(grid);


// Room function
function createRoom(w,d,h,color,x,z){

    const group = new THREE.Group();

    // floor
    const floor = new THREE.Mesh(
        new THREE.BoxGeometry(w,0.2,d),
        new THREE.MeshStandardMaterial({color})
    );

    group.add(floor);

    // walls
    const wallMaterial = new THREE.MeshStandardMaterial({
        color:0xdddddd,
        transparent:true,
        opacity:0.8
    });

    // back wall
    const backWall = new THREE.Mesh(
        new THREE.BoxGeometry(w,h,0.2),
        wallMaterial
    );

    backWall.position.set(0,h/2,-d/2);

    group.add(backWall);

    // left wall
    const leftWall = new THREE.Mesh(
        new THREE.BoxGeometry(0.2,h,d),
        wallMaterial
    );

    leftWall.position.set(-w/2,h/2,0);

    group.add(leftWall);

    group.position.set(x,0,z);

    scene.add(group);
}


// House
createRoom(14,16,5,0x4fc3f7,-5,10);
createRoom(10,10,5,0xef5350,8,8);
createRoom(12,12,5,0x81c784,-7,-10);
createRoom(11,12,5,0xffb74d,7,-10);
createRoom(10,15,3,0x90a4ae,8,18);


// Animate
function animate(){

    requestAnimationFrame(animate);

    controls.update();

    renderer.render(scene,camera);
}

animate();


// Resize
window.addEventListener("resize",()=>{

    camera.aspect = window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
