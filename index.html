<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Ladders 3D Plan</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:8px;
    z-index:10;
}
</style>
</head>

<body>

<div id="info">
    Dream Ladders 3D House Plan<br>
    North Facing ↑
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x20252f);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

//
// LIGHT
//

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(10,20,10);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,1);
scene.add(ambient);

//
// FLOOR
//

const floorGeo = new THREE.PlaneGeometry(28,44);

const floorMat = new THREE.MeshStandardMaterial({
    color:0x888888,
    side:THREE.DoubleSide
});

const floor = new THREE.Mesh(floorGeo,floorMat);

floor.rotation.x = Math.PI/2;

scene.add(floor);

//
// ROOM FUNCTION
//

function room(w,d,color,x,z){

    const geo = new THREE.BoxGeometry(w,0.5,d);

    const mat = new THREE.MeshStandardMaterial({
        color:color
    });

    const mesh = new THREE.Mesh(geo,mat);

    mesh.position.set(x,0.3,z);

    scene.add(mesh);
}

//
// HALL
//

room(14,16,0x4fc3f7,-5,10);

//
// BEDROOM 1
//

room(12,12,0x81c784,-7,-10);

//
// BEDROOM 2
//

room(11,12,0xffb74d,7,-10);

//
// KITCHEN
//

room(10,10,0xef5350,8,8);

//
// STAIRCASE
//

room(7,14,0xab47bc,-10,-18);

//
// PARKING
//

room(10,15,0x90a4ae,8,18);

//
// CAMERA
//

camera.position.set(0,35,35);

camera.lookAt(0,0,0);

//
// ANIMATION
//

function animate(){

    requestAnimationFrame(animate);

    scene.rotation.y += 0.002;

    renderer.render(scene,camera);
}

animate();

//
// RESPONSIVE
//

window.addEventListener('resize', ()=>{

    camera.aspect = window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
