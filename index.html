<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Ladders Web CAD</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#111; }
canvas { display:block; }

/* CONTROL PANEL */
#panel{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.75);
    padding:12px;
    border-radius:10px;
    color:white;
    width:200px;
    z-index:10;
}

input{
    width:90%;
    margin:4px 0;
    padding:5px;
}

button{
    width:100%;
    margin-top:6px;
    padding:6px;
    cursor:pointer;
}

#info{
    position:absolute;
    bottom:10px;
    left:10px;
    color:#fff;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<!-- UI FORM -->
<div id="panel">
    <h3>Room Editor</h3>

    <input id="name" placeholder="Room Name">
    <input id="w" placeholder="Width">
    <input id="d" placeholder="Depth">
    <input id="h" placeholder="Height">
    <input id="x" placeholder="X Position">
    <input id="z" placeholder="Z Position">

    <button onclick="addRoom()">Add Room</button>
</div>

<div id="info">Total Cost: ₹0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

//////////////////////////////
// 1. BASIC SETUP
//////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1b1b1b);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(40,40,40);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(50,80,50);
scene.add(dir);

//////////////////////////////
// 2. GROUND
//////////////////////////////

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(300,300),
    new THREE.MeshPhongMaterial({ color:0x2a2a2a })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

scene.add(new THREE.GridHelper(300,100));

//////////////////////////////
// 3. STATE (ENGINE MEMORY)
//////////////////////////////

let rooms = [];
let objects = [];

//////////////////////////////
// 4. ENGINE (COST)
//////////////////////////////

function calculateCost(r){
    const floor = r.w * r.d * 1200;
    const walls = 2*(r.w + r.d) * r.h * 400;
    return floor + walls;
}

//////////////////////////////
// 5. ENGINE (ADJACENCY)
//////////////////////////////

function isAdjacent(a,b){
    return Math.abs(a.x - b.x) < (a.w + b.w)/2 &&
           Math.abs(a.z - b.z) < (a.d + b.d)/2;
}

//////////////////////////////
// 6. RENDER ROOM
//////////////////////////////

function createRoom(r){

    const group = new THREE.Group();

    // FLOOR
    const floor = new THREE.Mesh(
        new THREE.BoxGeometry(r.w, 0.3, r.d),
        new THREE.MeshPhongMaterial({ color:0x4fc3f7 })
    );
    group.add(floor);

    // WALLS
    const wallMat = new THREE.MeshPhongMaterial({ color:0xffffff });

    const h = r.h;

    const walls = [
        [0, h/2, -r.d/2, r.w, h, 0.3],
        [0, h/2,  r.d/2, r.w, h, 0.3],
        [-r.w/2, h/2, 0, 0.3, h, r.d],
        [ r.w/2, h/2, 0, 0.3, h, r.d]
    ];

    walls.forEach(w=>{
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w[3], w[4], w[5]),
            wallMat
        );
        mesh.position.set(w[0],w[1],w[2]);
        group.add(mesh);
    });

    group.position.set(r.x,0,r.z);

    scene.add(group);
    objects.push(group);
}

//////////////////////////////
// 7. LABEL
//////////////////////////////

function createLabel(text,x,y,z){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 256;
    canvas.height = 128;

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText(text,20,70);

    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex }));

    sprite.position.set(x,y,z);
    sprite.scale.set(10,5,1);

    scene.add(sprite);
    objects.push(sprite);
}

//////////////////////////////
// 8. CLEAR SCENE
//////////////////////////////

function clearScene(){
    objects.forEach(o => scene.remove(o));
    objects = [];
}

//////////////////////////////
// 9. ADD ROOM FROM FORM
//////////////////////////////

function addRoom(){

    const r = {
        name: document.getElementById("name").value,
        w: Number(document.getElementById("w").value),
        d: Number(document.getElementById("d").value),
        h: Number(document.getElementById("h").value),
        x: Number(document.getElementById("x").value),
        z: Number(document.getElementById("z").value)
    };

    rooms.push(r);

    rerender();
}

//////////////////////////////
// 10. ENGINE RUNNER
//////////////////////////////

function rerender(){

    clearScene();

    let total = 0;

    rooms.forEach(r=>{
        createRoom(r);
        createLabel(r.name, r.x, 6, r.z);
        total += calculateCost(r);
    });

    document.getElementById("info").innerHTML =
        "Total Cost: ₹" + total;

    frameScene();
}

//////////////////////////////
// 11. CAMERA AUTO FIT
//////////////////////////////

function frameScene(){

    const box = new THREE.Box3().setFromObject(scene);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    const max = Math.max(size.x,size.y,size.z);

    camera.position.set(center.x+max, center.y+max, center.z+max);
    controls.target.copy(center);
    controls.update();
}

//////////////////////////////
// 12. START SCENE
//////////////////////////////

rerender();

//////////////////////////////
// 13. LOOP
//////////////////////////////

function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene,camera);
}
animate();

//////////////////////////////
// 14. RESIZE
//////////////////////////////

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
